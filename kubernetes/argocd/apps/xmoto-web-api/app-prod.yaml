apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: xmoto-web-api-prod

spec:
  project: default

  source:
    repoURL: https://github.com/xmoto/argocd-deployments.git
    targetRevision: HEAD
    path: xmoto-web-api/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy: {} # manual
