dex:
  enabled: false

notifications:
  enabled: true

applicationSet:
  enabled: true

configs:
  params:
    # TLS termination is handled by the Gateway API
    server.insecure: true

  cm:
    # Needed for KSOPS
    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"

  secret:
    createSecret: false

repoServer:
  env:
    - name: XDG_CONFIG_HOME
      value: /.config
    - name: SOPS_AGE_KEY_FILE
      value: /.config/sops/age/keys.txt

  volumes:
    - name: custom-tools
      emptyDir: {}

    - name: sops-age
      secret:
        secretName: sops-age-key

  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.5.1
      command: ["/usr/local/bin/ksops", "install", "--with-kustomize", "/custom-tools"]
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools

  volumeMounts:
    - mountPath: /usr/local/bin/ksops
      name: custom-tools
      subPath: ksops

    - mountPath: /.config/sops/age
      name: sops-age
